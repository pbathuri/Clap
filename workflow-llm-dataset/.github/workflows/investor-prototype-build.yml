name: investor-prototype-build

on:
  push:
    paths:
      - 'investor-prototype/**'
      - '.github/workflows/investor-prototype-build.yml'
  pull_request:
    paths:
      - 'investor-prototype/**'
      - '.github/workflows/investor-prototype-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: investor-prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: investor-prototype/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: investor-prototype-dist
          path: investor-prototype/dist
