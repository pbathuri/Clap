project:
  name: workflow_llm_dataset
  version: v1
  output_excel: outputs/excel/workflow_llm_primary_dataset_v1.xlsx
  output_csv_dir: outputs/csv
  output_parquet_dir: outputs/parquet
  qa_report_path: outputs/qa/build_report.md

runtime:
  timezone: UTC
  long_run_profile: true
  max_workers: 4
  fail_on_missing_provenance: true
  infer_low_confidence_threshold: 0.45
  infer_high_confidence_threshold: 0.8

paths:
  raw_official: data/raw/official
  raw_private: data/raw/private_examples
  interim: data/interim
  processed: data/processed
  prompts: prompts
  context: context
  sqlite_path: workflow_dataset.sqlite
  # Personal agent (local-first)
  event_log_dir: data/local/event_log
  graph_store_path: data/local/work_graph.sqlite
  audit_log_path: data/local/agent_audit.sqlite

# Personal agent: observation and execution (local-first; see docs/PRIVACY_AND_LOCAL_FIRST_MODEL.md)
agent:
  observation_enabled: false
  observation_tier: 1
  allowed_observation_sources: []  # empty = none; or [file, app, browser, terminal, calendar, teaching]
  privacy_mode: local_only
  sync_enabled: false
  execution_mode: simulate
  hardware_profile: pi5
  local_model_profile: small
  vector_store_path: data/local/vector_store
  sandbox_enabled: true
  file_observer:
    root_paths: []  # e.g. [./data] to scan; empty = no file observation
    max_files_per_scan: 10000
    exclude_dirs: [.git, __pycache__, node_modules, .venv, .tox, venv]
    allowed_extensions: []  # empty = all
    graph_update_enabled: true
