# Local LLM training config. Apple-Silicon-first (MLX); no cloud APIs.
# Paths are relative to repo root unless absolute.

backend: mlx
base_model: mlx-community/Llama-3.2-3B-Instruct-4bit
adapter_type: lora
output_dir: data/local/llm/runs
max_seq_length: 2048
train_batch_size: 2
eval_batch_size: 4
grad_accumulation: 4
learning_rate: 1e-5
num_epochs: 3
warmup_ratio: 0.1
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
max_train_examples: null
max_eval_examples: null
retrieval_enabled_for_eval: false
retrieval_top_k: 5
random_seed: 42

# Data paths (under data/local/llm/)
corpus_path: data/local/llm/corpus/corpus.jsonl
sft_train_dir: data/local/llm/sft
runs_dir: data/local/llm/runs
