# Full training profile for M16. Apple-Silicon / MLX; realistic for M4 Pro 24GB.
# Use for first serious personalization pass. Same base model as smoke; deeper training.

backend: mlx
base_model: mlx-community/Llama-3.2-3B-Instruct-4bit
adapter_type: lora
output_dir: data/local/llm/runs
runs_dir: data/local/llm/runs

# Deeper but still practical (M4 Pro 24GB)
max_seq_length: 1024
train_batch_size: 2
eval_batch_size: 4
grad_accumulation: 4
learning_rate: 1e-5
num_epochs: 5
warmup_ratio: 0.1
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
random_seed: 42

# Optional caps for very large SFT (null = use all)
max_train_examples: null
max_eval_examples: null

# Eval / retrieval
retrieval_enabled_for_eval: false
retrieval_top_k: 5

# Data paths (same as default)
corpus_path: data/local/llm/corpus/corpus.jsonl
sft_train_dir: data/local/llm/sft
runs_dir: data/local/llm/runs

# Naming: full runs use timestamp dir (e.g. 20250315_120000); smoke runs use smoke_YYYYMMDD_HHMMSS.
# Eval outputs: data/local/llm/runs/eval_out/ or runs_dir/comparison_YYYYMMDD_HHMMSS/
# Comparison report: runs_dir/comparison_latest.md and comparison_latest.json
